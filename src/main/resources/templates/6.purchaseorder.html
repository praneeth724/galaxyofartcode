<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy of Art - Purchase Order </title>
    <link rel="icon" href="pictures/bgnd/Art Gallery.jpg">

    <!-- link bootstrap css file -->
    <link rel="stylesheet" href="bootstrap-5.2.3/css/bootstrap.min.css">

    <!-- link fontawesome css file -->
    <link rel="stylesheet" href="fontawesome-free-7.2.0/fontawesome-free-7.2.0-web/css/all.min.css">

    <!-- link commen css file -->
    <link rel="stylesheet" href="comman.css">

</head>




<body>
    <!-- top nav bar -->
    <nav th:replace="topnavbar :: topNavbarFragment"></nav>

    <div class="container-fluid">

        <!-- title area -->
        <div class="row m-3 p-2  div-title">
            <div class="col text-center">
                <h1>Purchase Order</h1>
            </div>
        </div>

        <!-- tab lesa -->
        <div class="row mt-2 ">
            <div class="col">
                <ul class="nav nav-tabs" id="myTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="form-tab" data-bs-toggle="tab"
                            data-bs-target="#form-tab-pane" type="button" role="tab" aria-controls="form-tab-pane"
                            aria-selected="true"> <B> Purchase Form </B></button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="table-tab" data-bs-toggle="tab" data-bs-target="#table-tab-pane"
                            type="button" role="tab" aria-controls="table-tab-pane" aria-selected="false"> <b>
                                Purchase Table </b></button>
                    </li>

                </ul>
                <div class="tab-content" id="myTabContent">
                    <div class="tab-pane fade show active" id="form-tab-pane" role="tabpanel" aria-labelledby="form-tab"
                        tabindex="0">

                        <div class="card div-form">
                            <div class="card-body ">

                                <form id="formPO" onsubmit="return false">

                                    <!-- required penweemata -->
                                    <div class="row mt-1">
                                        <div class="col text-end">
                                            <p>Required <span class="text-danger">*</span></p>
                                        </div>
                                    </div>

                                    <!-- approved quotation -->
                                    <div class="row mt-1">

                                        <div class="col">
                                            <label for="selectQuotation" class="form-label fw-bold">Approved Quotation :
                                                <span class="text-danger">*</span></label>
                                            <select id="selectQuotation" onchange="loadQuotationDetails()" class="form-select">
                                                <option value="" selected disabled>Select Quotation</option>
                                            </select>
                                        </div>

                                        <div class="col">
                                            <label for="textSupplier" class="form-label fw-bold">Supplier :</label>
                                            <input type="text" readonly id="textSupplier" class="form-control">
                                        </div>

                                        <div class="col">
                                            <label for="textProduct" class="form-label fw-bold">Product :</label>
                                            <input type="text" readonly id="textProduct" class="form-control">
                                        </div>
                                    </div>

                                    <!--  dates,status-->
                                    <div class="row mt-1">

                                        <div class="col">
                                            <label for="orderDate" class="form-label fw-bold"> PO Date :
                                                <span class="text-danger">*</span></label>
                                            <input type="date" required id="poDate" class="form-control">
                                        </div>

                                        <div class="col">
                                            <label for="RequiredDate" class="form-label fw-bold"> Required Date :
                                                <span class="text-danger">*</span></label>
                                            <input type="date" required id="requiredDate" class="form-control">
                                        </div>

                                        <div class="col">
                                            <label for="poStatus" class="form-label fw-bold">PO Status :
                                                <span class="text-danger">*</span></label>
                                            <select id="poStatus" class="form-select">
                                                <option value="" selected disabled>Select Status</option>
                                                <option value="Pending">Pending</option>
                                                <option value="Approved">Approved</option>
                                                <option value="Received">Received</option>
                                                <option value="Cancelled">Cancelled</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- qunty,untprice,total -->
                                    <div class=" row mt-1">

                                        <div class="col">
                                            <label for="quantity" class="form-label fw-bold"> Quantity :
                                                <span class="text-danger">*</span></label>
                                            <input type="number" required placeholder="Enter Quantity" id="qty" min="1"
                                                class="form-control" onchange="calculateTotal()">
                                        </div>

                                        <div class="col">
                                            <label for="unitPrices" class="form-label fw-bold"> Unit Price :
                                                <span class="text-danger">*</span></label>
                                            <input type="number" required placeholder="Enter Price" min="0"
                                                id="unitPrice" class="form-control" onchange="calculateTotal()">
                                        </div>

                                        <div class="col">
                                            <label for="textTotalamount" class="form-label fw-bold"> Total Amount :</label>
                                            <input type="text" placeholder="Auto Calculated"
                                                id="total" readonly class="form-control">
                                        </div>
                                    </div>

                                    <br>
                                    <!-- buttons -->
                                    <div class="row mt-1">
                                        <div class="col-4">
                                            <button class="btn clear" id="buttonClear" type="reset">
                                                Clear</button>
                                        </div>

                                        <div class="col-8 text-end">
                                            <button class="btn update" id="buttonUpdate" type="button"
                                                onclick="updatePO()">
                                                Update</button>
                                            <button class="btn submit" id="buttonSubmit" type="button"
                                                onclick="submitPO()">
                                                Submit</button>
                                        </div>
                                    </div>

                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="table-tab-pane" role="tabpanel" aria-labelledby="table-tab" tabindex="0">

                    <!-- table -->
                    <div class="card div-table">
                        <div class="card-body table-responsive">
                            <table class=" table table-hover table-striped table-bordered" id="tablePo">

                                <thead class="table-dark">
                                    <tr>
                                        <th>#</th>
                                        <th>PO ID</th>
                                        <th>Supplier</th>
                                        <th>Product</th>
                                        <th>Required Date</th>
                                        <th> Quantity</th>
                                        <th> Total</th>
                                        <th>Status</th>
                                        <th>Modify/Action</th>
                                    </tr>
                                </thead>

                                <tbody id="tableBodyPurchase">

                                </tbody>

                            </table>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <!-- link sweet alert  -->
    <script src="sweetalert.min.js"></script>

    <!-- link js file -->
    <script src="bootstrap-5.2.3/js/bootstrap.bundle.min.js"></script>

    <!-- link jquary file -->
    <script src="js/jquery-4.0.0..min.js"></script>

    <!-- link common js file -->
    <script src="js/comman.js"></script>

    <!-- link purchase order js -->
    <script src="js/6.purchaseorder.js"></script>

</body>

</html>
