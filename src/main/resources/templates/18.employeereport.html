<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy of Art - Employee Report</title>
    <link rel="icon" href="/pictures/bgnd/Art Gallery.jpg">

    <link rel="stylesheet" href="/bootstrap-5.2.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="/fontawesome-free-7.2.0/fontawesome-free-7.2.0-web/css/all.min.css">
    <link rel="stylesheet" href="/comman.css">

    <style>
        .report-root {
            --accent: #4a3aa7;
            --accent-soft: #eae7f8;
            --surface-1: #fcfcfb;
            --text-secondary: #52514e;
            --muted: #898781;
            --grid: #e1e0d9;
        }

        .report-header-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .btn-generate {
            background: var(--accent);
            color: #fff;
            border: none;
        }

        .btn-generate:hover {
            background: var(--accent);
            filter: brightness(0.92);
            color: #fff;
        }

        .kpi-card {
            border: 1px solid var(--grid);
            border-radius: 10px;
            padding: 1rem;
            height: 100%;
            background: var(--surface-1);
        }

        .report-root .card {
            background: var(--surface-1);
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .kpi-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .kpi-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        thead.theme-head {
            background: var(--accent);
            color: #fff;
        }

        .status-pill {
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-active {
            background: #e6f4e6;
            color: #0ca30c;
        }

        .status-inactive {
            background: #f5e6e6;
            color: #d03b3b;
        }

        .chart-empty {
            font-size: 13px;
            fill: var(--muted);
        }

        #employeeChart {
            width: 100%;
            height: 200px;
        }

        .chart-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .chart-legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
        }
    </style>
</head>

<body class="report-root">
    <nav th:replace="topnavbar :: topNavbarFragment"></nav>

    <div class="container-fluid mt-3">

        <!-- header row -->
        <div class="row align-items-center mb-3">
            <div class="col-auto d-flex align-items-center gap-2">
                <span class="report-header-icon"><i class="fa-solid fa-users"></i></span>
                <h3 class="mb-0">Employee Report</h3>
            </div>
            <div class="col d-flex justify-content-end align-items-end gap-2 flex-wrap">
                <div>
                    <label class="form-label mb-0 small">From Date:</label>
                    <input type="date" id="fromDate" class="form-control form-control-sm">
                </div>
                <div>
                    <label class="form-label mb-0 small">To Date:</label>
                    <input type="date" id="toDate" class="form-control form-control-sm">
                </div>
                <button class="btn btn-generate btn-sm" onclick="generateReport()">
                    <i class="fa-solid fa-arrow-down"></i> Generate Report
                </button>
            </div>
        </div>

        <!-- KPI cards -->
        <div class="row g-3 mb-3" id="kpiRow">
        </div>

        <div class="row g-3">
            <!-- table -->
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body table-responsive">
                        <table class="table table-hover table-bordered mb-0">
                            <thead class="theme-head">
                                <tr>
                                    <th>#</th>
                                    <th>Employee ID</th>
                                    <th>Employee Name</th>
                                    <th>Department</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Status</th>
                                    <th>Join Date</th>
                                </tr>
                            </thead>
                            <tbody id="tableBodyEmployee"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- chart -->
            <div class="col-lg-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h6>Employees by Department</h6>
                        <svg id="employeeChart"></svg>
                        <div id="employeeLegend" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/sweetalert.min.js"></script>
    <script src="/bootstrap-5.2.3/js/bootstrap.bundle.min.js"></script>
    <script src="/js/jquery-4.0.0..min.js"></script>
    <script src="/js/comman.js"></script>
    <script src="/js/reportcharts.js"></script>
    <script src="/js/18.employeereport.js"></script>

</body>

</html>
